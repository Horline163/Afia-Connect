spring.application.name=backend
server.port=8081
spring.datasource.url=jdbc:postgresql://localhost:5432/afiadb
spring.datasource.username=${DB_USER:kitoga}
spring.datasource.password=${DB_PASSWORD:kitoga}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl
jwt.secret=${JWT_SECRET:645279b5c0750e9afc0679a718c5078e152154bce4d6a1bc0b58264f54262c75722e46bfcb8654fcdd3c360a32b196022fab60fe16563704a7cb115ae84ebd4a}
jwt.expiration=${JWT_EXPIRATION:86400000}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8080}
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
